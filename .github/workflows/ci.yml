name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --all-features

      - name: Build release
        run: cargo build --release

      - name: Type-check examples
        run: |
          for f in examples/*.pact; do
            echo "Checking $f ..."
            cargo run --release -- check "$f" || exit 1
          done

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-wasm-cargo-

      - name: Build WASM package
        run: wasm-pack build crates/pact-wasm --target web --out-dir ../../pkg

      - name: Verify WASM artifacts
        run: |
          test -f pkg/pact_wasm_bg.wasm || { echo "Missing .wasm binary"; exit 1; }
          test -f pkg/pact_wasm.js || { echo "Missing JS bindings"; exit 1; }
          test -f pkg/pact_wasm.d.ts || { echo "Missing TS definitions"; exit 1; }
          echo "WASM artifacts OK"
